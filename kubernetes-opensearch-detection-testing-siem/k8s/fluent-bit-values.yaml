# 1. Use the official debug image to bypass distroless limitations for troubleshooting
image:
  repository: cr.fluentbit.io/fluent/fluent-bit
  tag: 3.2.10-debug

# 2. Register custom parser to read and parse auditd's key=value format natively
config:
  customParsers: |
    [PARSER]
        name        auditd_parser
        format      logfmt

  # 3. Enable the local HTTP server on port 2020 for metrics/troubleshooting
  service: |
    [SERVICE]
        daemon       off
        flush        1
        log_level    info
        parsers_file parsers.conf
        parsers_file custom_parsers.conf
        http_server  on
        http_listen  0.0.0.0
        http_port    2020

  # 4. Tail the host audit log
  inputs: |
    [INPUT]
        name              tail
        path              /var/log/audit/audit.log
        tag               audit.events
        parser            auditd_parser
        db                /var/log/flb_audit.db
        mem_buf_limit     50MB
        skip_long_lines   on
        refresh_interval  5

  # 5. Output matches all logs tagged "audit.*" and routes to the "linux-audit" index
  outputs: |
    [OUTPUT]
        name                opensearch
        match               audit.*
        host                opensearch-cluster-master
        port                9200
        http_user           admin
        http_passwd         <your password>
        index               linux-audit
        suppress_type_name  on
        tls                 on
        tls.verify          off

# 6. Run container as root, but join the Ubuntu host's 'adm' group (GID 4) to read the log 
securityContext:
  runAsUser: 0
  privileged: true

podSecurityContext:
  supplementalGroups: [4]

# 7. Mount the physical host directories (log and docker context paths)
daemonSetVolumeMounts:
  - name: host-audit-logs
    mountPath: /var/log/audit
    readOnly: true
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

daemonSetVolumes:
  - name: host-audit-logs
    hostPath:
      path: /var/log/audit
      type: Directory
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers