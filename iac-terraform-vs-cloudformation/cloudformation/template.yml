AWSTemplateFormatVersion: '2010-09-09'
Description: 'SRE IaC Project - Base VPC Infrastructure'

Resources:
  # 1. Create the VPC
  SreVpc:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: 'sre-cloudformation-vpc'

  # 2. Create the Internet Gateway
  SreInternetGateway:
    Type: 'AWS::EC2::InternetGateway'
    Properties:
      Tags:
        - Key: Name
          Value: 'sre-igw'

  # 3. Attach Internet Gateway to VPC (CloudFormation requires this explicit step)
  VpcGatewayAttachment:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: !Ref SreVpc
      InternetGatewayId: !Ref SreInternetGateway

  # 4. Create the Public Subnet
  SrePublicSubnet:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref SreVpc
      CidrBlock: '10.0.1.0/24'
      MapPublicIpOnLaunch: true
      AvailabilityZone: 'us-east-1a'
      Tags:
        - Key: Name
          Value: 'sre-public-subnet'